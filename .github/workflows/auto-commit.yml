name: Smart Auto Commit

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (4 times/day)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate random commits
        run: |
          messages=("fix bug" "update code" "improve logic" "refactor" "minor changes" "optimize" "cleanup")
          
          count=$(( (RANDOM % 4) + 2 ))  # 2 to 5 commits

          for i in $(seq 1 $count)
          do
            file="file_$((RANDOM % 5)).txt"
            
            echo "Update $RANDOM at $(date)" >> $file
            
            git add .
            msg=${messages[$RANDOM % ${#messages[@]}]}
            git commit -m "$msg" || echo "No changes"
            
            sleep $(( (RANDOM % 20) + 5 ))  # random delay 5–25 sec
          done

      - name: Push changes
        run: |
          git config --global user.name "BSampathKumar2004"
          git config --global user.email "bandarussampathkumar16@gmail.com"
          git push
